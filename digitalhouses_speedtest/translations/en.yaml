configuration:
  periodic_test_enabled:
    name: Periodic tests
    description: Enable automatic speed tests.
  periodic_test_interval_minutes:
    name: Periodic test interval
    description: Minutes between automatic tests, from 5 minutes to 12 hours.
  server_ids:
    name: Preferred server IDs
    description: >-
      Ookla server IDs in priority order. Leave the list empty to use automatic
      selection. Use the Refresh server list button to discover nearby IDs.
  automatic_server_fallback:
    name: Automatic server fallback
    description: >-
      Use Ookla automatic server selection if every configured server ID fails.
  speedtest_timeout_seconds:
    name: Speedtest timeout
    description: Maximum runtime of one Ookla test attempt in seconds.
  connectivity_check:
    name: Connectivity checks
    description: ICMP checks used to determine whether a speed test can run.
    fields:
      interval_seconds:
        name: Check interval
        description: Seconds between connectivity checks.
      attempts:
        name: Attempts
        description: ICMP echo requests sent to each target per check.
      timeout_seconds:
        name: Attempt timeout
        description: Timeout of each ICMP attempt in seconds.
  expire_after_seconds:
    name: Measurement expiry
    description: >-
      Seconds before speed measurements become unavailable without a new test.
      Set to 0 to disable expiry.
  log_level:
    name: Log level
    description: Amount of information written to the App log.
