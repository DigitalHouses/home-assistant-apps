configuration:
  periodic_test_enabled:
    name: Periodic speed tests
    description: Run Ookla Speedtest automatically on a schedule.
  periodic_test_interval_minutes:
    name: Periodic test interval
    description: Startup and compatibility value in minutes. The live interval can also be changed through the Home Assistant Number entity.
  server_ids:
    name: Preferred server IDs
    description: Ookla server IDs in priority order. Leave empty for automatic selection.
  automatic_server_fallback:
    name: Automatic server fallback
    description: Try automatic server selection after preferred servers fail.
  speedtest_timeout_seconds:
    name: Speedtest timeout
    description: Maximum runtime of one Ookla Speedtest attempt.
  connectivity_check:
    name: Connectivity check
    description: Independent checks of 8.8.8.8 and 1.1.1.1.
  connectivity_check.interval_seconds:
    name: Connectivity check interval
    description: Seconds between connectivity checks.
  connectivity_check.attempts:
    name: Connectivity attempts
    description: ICMP attempts per target.
  connectivity_check.timeout_seconds:
    name: Connectivity timeout
    description: Timeout in seconds for each ICMP attempt.
  expire_after_seconds:
    name: Result expiration
    description: Age after which measurements and performance evaluation become unavailable. Use 0 to disable expiration.
  recent_results_limit:
    name: Recent results limit
    description: Number of successful tests retained in the diagnostic Recent results sensor.
  log_level:
    name: Log level
    description: Application logging verbosity.
